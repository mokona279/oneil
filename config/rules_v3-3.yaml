# 주도주 추세추종 매매규칙서 백테스트 — 규칙 파라미터 (단일 진실 원천: oneil_strategy.md v3-3
# + 개선계획 P1 승인분 R1·R2). 계획서 §5 참조. 코드 내 수치 하드코딩 금지.
# 범위 표기(예: +25~30%)는 계획서 §12 결정 질문에 따라 단일값을 채택했다.
# v3-4 = v3-3 + P1(R1 수축 k×ATR 하이브리드 k=5, R2a 200MA 5·20일 OR, R2b 밴드 25%)
# — 2026-07-14 트레이드오프 표 사용자 승인(plan/p1_gates.md). 베이스라인 재현은 이
# 세 키를 null/null/15로 되돌리면 v3-3과 비트 동일.
# v3-5 = v3-4 + P2(R3b 새 사이클 리셋 N=12, Q11 손절가 하향 금지 — R3a 감액은 실측 기각)
# — 2026-07-14 조건부 승인(plan/p2_stage.md): 실측 효과 표본이 9.5년에 2건(하이닉스
# 12-30 진입·083310 조기 손절)뿐이라 **과적합 가능성 추적 의무** — 이후 Phase 검증마다
# 리셋·클램프 발동 건수와 손익 기여를 분리 집계해 병기하고, P5 워크포워드에서 on/off
# 재검증한다. v3-4 재현은 reset_no_breakout_months/no_lower_recalc를 null/false로.
# v3-6 = v3-5 + P4(R4b 추세 복귀 재진입: 50MA 종가 회복 confirm=5일 연속·자격 유효
# window=3개월) — 2026-07-16 승인(plan/p4_reentry.md). 발동 26건·직접 +160.6R·MDD 무비용.
# 조건: §3.3 상시 추적 편입(발동 분리 집계), Q13 스윕에 W축 편입, P5 워크포워드 on/off
# 재검증(W가 약세장 민감축). v3-5 재현은 reentry.confirm_sessions/window_months를 null로.
# v3-7 = v3-6 + Q13a(자본 제약 해소: max_positions 8→12, reserve_pyramid_cash 해제,
# reentry.window_months 3→1) — 2026-07-17 승인(plan/q13_capital.md). 캡처 61→69·수익
# +640→+755%·MDD +0.71pp·병목 52→39. R4a 핸들·R3a 감액은 재상정 실측 후 기각(전 조합
# 역효과 / 5건 저표본). 조건: P5 워크포워드에 자본축·W축 재검증 편입, 잔여 병목은
# Q13(c) 교체 규칙 별도 상정, §3.3 추적 계속. v3-6 재현은 세 키를 8/true/3으로.

rulebook_version: "v3-7"          # 재현성 태그
calendar_source: index            # 거래일 = 지수 CSV 날짜 기준

trend_template:                   # §3 0단계 — 트렌드 템플릿 7조건 (AND)
  above_ma: [150, 200]            # 주가 > 150MA & 200MA
  ma150_gt_ma200: true            # 150MA > 200MA
  ma200_rising_lookback: 20       # "200MA 1개월 이상 상승" 정의 (Q6)
  ma200_rising_lookback_alt: 5    # R2a(개선계획 Q3b): 5·20일 룩백 OR — P1 승인(2026-07-14)
  ma50_gt_ma150: true             # 50MA > 150MA
  low_52w_gain_min_pct: 25        # 52주 저가 대비 +25% 이상 (Q6: 25 채택)
  high_52w_within_pct: 25         # 52주 고가 -25% 이내 — R2b(Q4) 미너비니 원전 환원, P1 승인
  turnover_20d_min_krw: 1.0e10    # 20일 평균 거래대금 >= 100억

overheating:                      # §3 과열 제외 / §5 품질1
  ret_lookback_days: 20
  ret_threshold_pct: 50           # 20일 수익률 > 50% 진입 금지
  require_no_base: true           # "베이스 없이" 한정 (Q4)
  limitup_lookback_days: 10       # 2주내 상한가 (Q3: 데이터 필요)
  swing_pct: 15                   # ±15% 스윙 반복 (Q3: 정의 필요)
  swing_min_count: null

rs:                               # §3 1단계 상대강도
  lookback_days: 126              # 6개월
  method: return_diff             # 종목 6M수익 - 지수 6M수익 > 0 (Q5)
  rank_top_pct: null   # Q14 — 전시장 RS 백분위 상위 X%만 진입(스윕 전 기본 off)
  rank_scope: all      # all=전시장 통합 | market=시장별(KOSPI/KOSDAQ)

base:                             # §5 베이스 규칙
  depth_tiers:
    - {max_depth_pct: 15, min_weeks: 5}     # 플랫/얕은 베이스
    - {max_depth_pct: 33, min_weeks: 7}     # 컵/더블바텀
  invalid_depth_pct: 33           # 초과 시 패턴 무효
  min_days_per_week: 7            # 최소 N주 = 경과 >= 7*N 달력일
  stage:
    step_up_close_gain_pct: 20    # 유효돌파 후 +20% 상승 뒤 베이스 = 단계+1
    max_stage: 3                  # 1~3 허용, 4+ 금지(overlimit_weight_factor로 감액 허용 가능)
    overlimit_weight_factor: null # R3a(개선계획 Q5a): 4단계+ 감액 진입 — P2 기각 → Q13 재상정에서도 재기각(2026-07-17, 발동 5건 저표본·MDD +1.4pp). null=금지
    reset_no_breakout_months: 12  # R3b(Q5b): 12개월 무돌파+깊이 20%+ 새 베이스 → 단계 1 리셋 — P2 승인(2026-07-14, 과적합 추적 조건부)
    reset_min_depth_pct: 20       # R3b 리셋 인정 최소 베이스 깊이(%)
  handle:                         # R4a(Q10): 컵위드핸들 손잡이 피벗 — P3 null-keep → Q13 재상정 실측 후 기각(2026-07-17, plan/q13_capital.md)
    min_sessions: null            # 자본 완화 후에도 전 조합 역효과(수익 -43~-51pp·캡처 -1) — 순수 엣지 음(-). null=현행(절대 고점 피벗)
    max_depth_pct: null           # (기각된 후보값 기록: min_sessions=20 / max_depth_pct=12, out/p3/candidate_handle20)

quality:                          # §5 품질요건 (전부 충족)
  atr_le_pivot_pct: 10            # 2*ATR <= 피벗*10%
  contraction_lookback: 10        # 직전 10일 레인지 <= 피벗*10%
  contraction_le_pivot_pct: 10
  contraction_atr_mult: 5         # R1(개선계획 Q1b): 임계 = max(피벗%, k×ATR), k=5 — P1 스윕 플래토 중앙, 승인(2026-07-14)
  dryup_lookback: 10              # 직전 10일 평균거래량 < 베이스 일평균

entry:                            # §4 매수
  breakout_use_intraday: true     # 돌파만 장중, 나머지 종가
  chase_limit_pct: 5              # 피벗 +5% 이내만 추격
  breakout_volume_mult: 1.5       # 돌파일 거래량 >= 20일평균 * 1.5
  tranche_ratios: [0.5, 0.3, 0.2] # 목표비중 분할 (1/2/3차)
  pyramid_triggers_pct: [2.5, 5]  # 2차: 1차 +2.5%, 3차: 1차 +5%
  tranche_price_cap_pct: 3        # 트리거가 +3% 상한, 초과 갭 시 스킵

reentry:                          # R4b(Q6): 추세 복귀 재진입 — P4 승인(2026-07-16, plan/p4_reentry.md)
  ma: 50                          # 복귀 기준선(10주선)
  confirm_sessions: 5             # M: 종가 >= 50MA 연속 유지 거래일 — 스윕 플래토 정점(5/3). null=꺼짐(v3-5 재현)
  window_months: 1                # W: §6② 전량 청산 후 자격 유효 개월 — Q13 재검증으로 3→1(2026-07-17), 6·12는 약세장 열세로 기각

stop:                             # §6-①
  method: atr2x                   # atr2x | fixed_pct (Q14)
  atr_mult: 2.0
  max_stop_pct: 10                # 손절폭 캡 -10%
  fixed_pct: 8                    # 대안(고정 -7~8%)
  fill_model: close_confirmed_next_open   # Q1: vs intraday_touch
  no_lower_recalc: true           # Q11(확정 2026-07-12): 피라미딩 재계산 시 손절가 하향 금지 — P2 승인(2026-07-14)

exit:                             # §6-②③ + 보조
  ma_trend: 60
  trend_break_partial: 0.5        # 60MA 이탈 시 절반 매도
  trend_recover_days: 3           # 3거래일 내 회복 실패 시 잔량
  volbreak_full: false            # 거래량 급증 이탈 즉시 전량? (Q7)
  volbreak_mult: 2.0
  market_defense_ma: 120
  market_defense_reduce: 0.5      # 해당 시장 종목 절반
  eight_week:
    fast_gain_pct: 20             # 돌파후 3주 내 +20%
    fast_window_days: 21
    min_hold_days: 56             # 8주 보유 (①② 외 정지)

sizing:                           # §1
  risk_per_trade_pct: 1           # 참고(공식이 자동 보장)
  max_weight_pct: 20              # 1종목 상한
  min_weight_pct: null            # 하한 없음
  reserve_pyramid_cash: false     # 2·3차 예약 해제 — Q13 승인(2026-07-17): 예약은 거의 무발동 보험, 해제 시 피라미딩 위축 없음(§4.3 판독 4)

portfolio:                        # §1 / §3.10
  max_positions: 12               # Q13 승인(2026-07-17): 8→12 — 캡처 +8, MDD +0.71pp(가드레일 내)
  min_positions_soft: 5           # 강제 아님

market_filter:                    # §2
  entry_ma: 60                    # 지수 > 60MA 정상
  defense_ma: 120
  defense_max_equity_pct: 50      # 방어 시 주식비중 상한
  recover_days: 3                 # 60MA 위 3거래일 유지 → 정상 복귀

risk_governor:                    # §7 생존수칙
  enabled: true                   # (Q12)
  consecutive_stops: 3
  halt_days: 10                   # 2주
